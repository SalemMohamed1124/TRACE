<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRACE — ERD</title>
<style>
  body{margin:0;background:#EEF2F7;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
  h1{color:#1E3A5F;font-size:20px;margin-bottom:10px}
  .controls { margin-bottom: 20px; display: flex; gap: 10px; }
  button { padding: 10px 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; font-family: Arial, sans-serif; }
  button:hover { opacity: 0.9; }
  .btn-png { background: #4A90D9; color: white; }
  .btn-svg { background: #1E3A5F; color: white; }
  #wrap{background:#fff;box-shadow:0 2px 16px rgba(0,0,0,0.12);padding:20px;overflow:auto}
</style>
</head>
<body>
<h1>TRACE Platform — Entity Relationship Diagram</h1>

<div class="controls">
  <button class="btn-png" onclick="downloadPNG()">Download as PNG</button>
  <button class="btn-svg" onclick="downloadSVG()">Download as SVG</button>
</div>

<div id="wrap"><svg id="erd" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff;"></svg></div>

<script>
const C={hBg:'#4A90D9',hFg:'#fff',pkBg:'#EBF3FF',rBg:'#fff',aBg:'#F5F9FF',bd:'#B8D4EE',tx:'#1E293B',ty:'#5B7FA6',fk:'#1D4ED8',ln:'#4A90D9'};
const TW=215,HH=30,RH=21,NS='http://www.w3.org/2000/svg';

const tables=[
 {id:'users',x:50,y:30,fields:[{n:'id',t:'uuid',pk:1},{n:'name',t:'varchar'},{n:'email',t:'varchar',note:'unique'},{n:'password_hash',t:'varchar'},{n:'created_at',t:'timestamp'},{n:'updated_at',t:'timestamp'}]},
 {id:'org_members',x:50,y:200,fields:[{n:'id',t:'uuid',pk:1},{n:'user_id',t:'uuid',fk:1},{n:'org_id',t:'uuid',fk:1},{n:'role',t:'enum'},{n:'joined_at',t:'timestamp'}]},
 {id:'notifications',x:50,y:370,fields:[{n:'id',t:'uuid',pk:1},{n:'user_id',t:'uuid',fk:1},{n:'type',t:'enum'},{n:'message',t:'text'},{n:'is_read',t:'bool'},{n:'metadata',t:'jsonb'},{n:'created_at',t:'timestamp'}]},
 {id:'organizations',x:315,y:30,fields:[{n:'id',t:'uuid',pk:1},{n:'name',t:'varchar'},{n:'created_at',t:'timestamp'}]},
 {id:'assets',x:315,y:145,fields:[{n:'id',t:'uuid',pk:1},{n:'org_id',t:'uuid',fk:1},{n:'created_by',t:'uuid',fk:1},{n:'name',t:'varchar'},{n:'type',t:'enum'},{n:'value',t:'varchar'},{n:'created_at',t:'timestamp'},{n:'updated_at',t:'timestamp'}]},
 {id:'scan_schedules',x:315,y:370,fields:[{n:'id',t:'uuid',pk:1},{n:'asset_id',t:'uuid',fk:1},{n:'org_id',t:'uuid',fk:1},{n:'created_by',t:'uuid',fk:1},{n:'scan_type',t:'enum'},{n:'frequency',t:'enum'},{n:'time_of_day',t:'varchar'},{n:'next_run_at',t:'timestamp'},{n:'is_active',t:'bool'},{n:'created_at',t:'timestamp'}]},
 {id:'scans',x:580,y:30,fields:[{n:'id',t:'uuid',pk:1},{n:'asset_id',t:'uuid',fk:1},{n:'org_id',t:'uuid',fk:1},{n:'initiated_by',t:'uuid',fk:1},{n:'type',t:'enum'},{n:'status',t:'enum'},{n:'is_scheduled',t:'bool'},{n:'created_at',t:'timestamp'}]},
 {id:'vulnerabilities',x:580,y:240,fields:[{n:'id',t:'uuid',pk:1},{n:'name',t:'varchar'},{n:'severity',t:'enum'},{n:'category',t:'varchar'},{n:'cve_id',t:'varchar'},{n:'created_at',t:'timestamp'}]},
 {id:'scan_findings',x:580,y:408,fields:[{n:'id',t:'uuid',pk:1},{n:'scan_id',t:'uuid',fk:1},{n:'vuln_id',t:'uuid',fk:1},{n:'evidence',t:'text'},{n:'location',t:'varchar'},{n:'created_at',t:'timestamp'}]},
 {id:'ai_analyses',x:845,y:30,fields:[{n:'id',t:'uuid',pk:1},{n:'scan_id',t:'uuid',fk:1,note:'unique'},{n:'status',t:'enum'},{n:'gemini_model',t:'varchar'},{n:'risk_score',t:'int'},{n:'risk_level',t:'enum'},{n:'analysis_text',t:'text'},{n:'recommendations',t:'jsonb'},{n:'key_findings',t:'jsonb'},{n:'prompt_tokens',t:'int'},{n:'created_at',t:'timestamp'},{n:'updated_at',t:'timestamp'}]},
 {id:'reports',x:845,y:320,fields:[{n:'id',t:'uuid',pk:1},{n:'scan_id',t:'uuid',fk:1},{n:'created_by',t:'uuid',fk:1},{n:'format',t:'enum'},{n:'file_path',t:'varchar'},{n:'download_url',t:'varchar'},{n:'expires_at',t:'timestamp'},{n:'created_at',t:'timestamp'}]},
];

const rels=[
 {from:'org_members',fromF:'user_id',to:'users',toF:'id', off: 20},
 {from:'org_members',fromF:'org_id',to:'organizations',toF:'id', off: 0},
 {from:'notifications',fromF:'user_id',to:'users',toF:'id', off: 30},
 {from:'assets',fromF:'org_id',to:'organizations',toF:'id', off: 20},
 {from:'assets',fromF:'created_by',to:'users',toF:'id', off: 0},
 {from:'scan_schedules',fromF:'asset_id',to:'assets',toF:'id', off: 30},
 {from:'scan_schedules',fromF:'org_id',to:'organizations',toF:'id', off: 40},
 {from:'scan_schedules',fromF:'created_by',to:'users',toF:'id', off: -10},
 {from:'scans',fromF:'asset_id',to:'assets',toF:'id', off: -10},
 {from:'scans',fromF:'org_id',to:'organizations',toF:'id', off: 10},
 {from:'scans',fromF:'initiated_by',to:'users',toF:'id', custom: 'scans_users'},
 {from:'scan_findings',fromF:'scan_id',to:'scans',toF:'id', off: 20},
 {from:'scan_findings',fromF:'vuln_id',to:'vulnerabilities',toF:'id', off: 30},
 {from:'ai_analyses',fromF:'scan_id',to:'scans',toF:'id', off: 0, unique: true},
 {from:'reports',fromF:'scan_id',to:'scans',toF:'id', off: 0},
 {from:'reports',fromF:'created_by',to:'users',toF:'id', custom: 'reports_users'},
];

const tmap={};
tables.forEach(t=>tmap[t.id]=t);
const tH=t=>HH+t.fields.length*RH;
const fY=(t,n)=>{const i=t.fields.findIndex(f=>f.n===n);return t.y+HH+i*RH+RH/2;};

function mk(tag,a,parent){const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));if(parent)parent.appendChild(e);return e;}
function tx(svg,txt,a){const e=mk('text',a,svg);e.textContent=txt;return e;}

function drawTable(svg,t){
  const h=tH(t);
  mk('rect',{x:t.x+2,y:t.y+2,width:TW,height:h,fill:'rgba(0,0,0,0.06)'},svg);
  mk('rect',{x:t.x,y:t.y,width:TW,height:h,fill:C.rBg,stroke:C.bd,'stroke-width':'1'},svg);
  mk('rect',{x:t.x,y:t.y,width:TW,height:HH,fill:C.hBg},svg);
  tx(svg,t.id,{x:t.x+8,y:t.y+19,fill:C.hFg,'font-family':'Arial','font-size':'12.5','font-weight':'bold'});
  t.fields.forEach((f,i)=>{
    const ry=t.y+HH+i*RH;
    mk('line',{x1:t.x,y1:ry,x2:t.x+TW,y2:ry,stroke:C.bd,'stroke-width':'0.6'},svg);
    if(f.pk)mk('rect',{x:t.x+1,y:ry,width:TW-2,height:RH,fill:C.pkBg},svg);
    else if(i%2)mk('rect',{x:t.x+1,y:ry,width:TW-2,height:RH,fill:C.aBg},svg);
    const icon=f.pk?'🔑':f.fk?'🔗':'';
    if(icon)tx(svg,icon,{x:t.x+3,y:ry+14,'font-size':'9','font-family':'Arial'});
    tx(svg,f.n,{x:t.x+(icon?18:8),y:ry+14,fill:f.pk?C.fk:f.fk?C.fk:C.tx,'font-family':'Arial','font-size':'11.5','font-weight':f.pk?'bold':'normal'});
    tx(svg,f.note?`${f.t} (${f.note})`:f.t,{x:t.x+TW-5,y:ry+14,fill:C.ty,'font-family':'Arial','font-size':'10.5','text-anchor':'end'});
  });
  mk('rect',{x:t.x,y:t.y,width:TW,height:h,fill:'none',stroke:C.bd,'stroke-width':'1'},svg);
}

function tick(svg, x, y, dx) {
  const d1 = x + dx * 5;
  const d2 = x + dx * 9;
  mk('line',{x1:d1, y1:y-5, x2:d1, y2:y+5, stroke:C.ln, 'stroke-width':'1.4'}, svg);
  mk('line',{x1:d2, y1:y-5, x2:d2, y2:y+5, stroke:C.ln, 'stroke-width':'1.4'}, svg);
}

function crowFoot(svg, x, y, dx, isUnique) {
  if (isUnique) { tick(svg, x, y, dx); return; }
  const L = 12, S = 7;
  [[0,S],[0,0],[0,-S]].forEach(([_,dy])=>{
    mk('line',{x1:x, y1:y+dy, x2:x+dx*L, y2:y, stroke:C.ln, 'stroke-width':'1.4'}, svg);
  });
}

function drawRel(svg,r){
  const ft=tmap[r.from], tt=tmap[r.to];
  if(!ft||!tt)return;
  const fy=fY(ft,r.fromF), ty=fY(tt,r.toF);
  let x1, y1, x2, y2, d, dx1, dx2;

  if (r.custom === 'scans_users') {
    x1 = 580+TW; y1 = fy; dx1 = 1;
    x2 = 50+TW; y2 = ty; dx2 = 1;
    d = `M${x1+14},${y1} H810 V15 H290 V${y2} H${x2+10}`;
  } else if (r.custom === 'reports_users') {
    x1 = 845+TW; y1 = fy; dx1 = 1;
    x2 = 50; y2 = ty; dx2 = -1;
    d = `M${x1+14},${y1} H1085 V640 H20 V${y2} H${x2-10}`;
  } else if(ft.x === tt.x){
    x1 = ft.x; y1 = fy; dx1 = -1;
    x2 = tt.x; y2 = ty; dx2 = -1;
    const lx = x1 - (r.off || 15);
    d = `M${x1-14},${y1} H${lx} V${y2} H${x2-10}`;
  } else if(tt.x > ft.x){
    x1 = ft.x+TW; y1 = fy; dx1 = 1;
    x2 = tt.x;    y2 = ty; dx2 = -1;
    const mx = (x1+x2)/2 + (r.off || 0);
    d = `M${x1+14},${y1} H${mx} V${y2} H${x2-10}`;
  } else {
    x1 = ft.x;      y1 = fy; dx1 = -1;
    x2 = tt.x + TW; y2 = ty; dx2 = 1;
    const mx = (x1+x2)/2 + (r.off || 0);
    d = `M${x1-14},${y1} H${mx} V${y2} H${x2+10}`;
  }

  mk('path',{d,fill:'none',stroke:C.ln,'stroke-width':'1.3'},svg);
  crowFoot(svg, x1, y1, dx1, r.unique);
  tick(svg, x2, y2, dx2);
}

let mx=0,my=0;
tables.forEach(t=>{mx=Math.max(mx,t.x+TW);my=Math.max(my,t.y+tH(t));});
const svg=document.getElementById('erd');
svg.setAttribute('width',mx+50);
svg.setAttribute('height',my+60); 

// Solid white background rect so the exported SVG has a background
const bgRect = document.createElementNS(NS, 'rect');
bgRect.setAttribute('width', '100%');
bgRect.setAttribute('height', '100%');
bgRect.setAttribute('fill', '#ffffff');
svg.appendChild(bgRect);

rels.forEach(r=>drawRel(svg,r));
tables.forEach(t=>drawTable(svg,t));

// --- EXPORT FUNCTIONS ---
function getSVGString() {
  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(svg);
  // Add namespaces if missing
  if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
      source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
  }
  if(!source.match(/^<svg[^>]+"http\:\/\/www\.w3\.org\/1999\/xlink"/)){
      source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
  }
  return '<?xml version="1.0" standalone="no"?>\r\n' + source;
}

function downloadSVG() {
  const source = getSVGString();
  const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
  const a = document.createElement("a");
  a.href = url;
  a.download = "TRACE_Platform_ERD.svg";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function downloadPNG() {
  const source = getSVGString();
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  
  // High resolution export
  const scale = 2;
  canvas.width = (mx + 50) * scale;
  canvas.height = (my + 60) * scale;
  ctx.scale(scale, scale);
  
  // Fill white background
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const img = new Image();
  img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(source)));

  img.onload = function() {
    ctx.drawImage(img, 0, 0);
    const a = document.createElement("a");
    a.download = "TRACE_Platform_ERD.png";
    a.href = canvas.toDataURL("image/png", 1.0);
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
}
</script>
</body>
</html>
